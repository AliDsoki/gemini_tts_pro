name: Build GeminiTTSPro (Windows one-dir)

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # يسمح بتشغيل الـ workflow يدويًا من تبويب Actions

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (one-dir)
        run: pyinstaller gemini_tts_pro.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeminiTTSPro-windows
          path: dist/GeminiTTSPro/
